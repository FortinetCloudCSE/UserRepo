# REVIEW MODEL
#
# This workflow sends PR metadata and the unified git diff as plain text to the
# OpenAI Responses API and receives plain-text analysis back. It reviews only
# the changes introduced by the current PR relative to the base branch; it is
# not a full-repository scan for pre-existing vulnerabilities.
#
#
# Security properties:
#   - The workflow runs on pull_request_target from the trusted base branch.
#   - The PR head is fetched only as git data and is never checked out or run.
#   - No agent or tool-using model runtime executes on the runner.
#   - OPENAI_API_KEY is used only for the outbound API request.
#
# Residual risk:
#   - A malicious diff can still attempt prompt injection against the model, but
#     that can only influence the quality of the advisory report, not cause
#     repository code execution through the model.

name: Codex Advisory Security Review

on:
  # Use pull_request_target so this workflow runs from the trusted base branch.
  # Do not convert this to pull_request while OPENAI_API_KEY is in use.
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: codex-advisory-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codex_review:
    if: |
      github.event.pull_request.draft == false &&
      contains(fromJSON('["COLLABORATOR", "MEMBER", "OWNER"]'),
               github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      enabled: ${{ steps.codex_auth.outputs.enabled }}
      final_message: ${{ steps.final_message.outputs.final_message }}
    steps:
      # Check out only trusted base-branch content in secret-bearing PR runs.
      - name: Checkout trusted base branch for pull requests
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      # Fetch the untrusted PR head as data for git diff/git show only.
      # Do not check out this ref or execute scripts from it.
      - name: Fetch pull request head ref without checking it out
        run: |
          git fetch --no-tags origin \
            +refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }}

      # Generate trusted review instructions from the workflow itself so PR
      # authors cannot modify instructions used in a secret-bearing run.
      - name: Write trusted review instructions
        run: |
          cat > .codex-security-review.md <<'EOF'
          Review this repository for security issues introduced or exposed by the current pull request.

          Repository context:
          - This is a Hugo-based static workshop and documentation site.
          - The primary automation in the repo is GitHub Actions for building and deploying Pages.
          - This review is advisory only. Do not propose disruptive refactors unless they directly address a concrete security issue.

          Trust boundary:
          - You are running from the trusted base branch checkout at HEAD.
          - The untrusted pull request head is available only as a git ref at refs/remotes/origin/pr/${{ github.event.pull_request.number }}.
          - Do not check out the pull request branch.
          - Do not execute scripts, builds, or commands from the pull request branch.
          - Inspect the PR only through git diff and git show.

          Scope:
          - Focus on the diff between HEAD and refs/remotes/origin/pr/${{ github.event.pull_request.number }}.
          - Prefer commands like:
            - git diff --name-only HEAD...refs/remotes/origin/pr/${{ github.event.pull_request.number }}
            - git diff --unified=0 HEAD...refs/remotes/origin/pr/${{ github.event.pull_request.number }}
            - git show refs/remotes/origin/pr/${{ github.event.pull_request.number }}:<path>
          - If a finding depends on surrounding trusted context, inspect the base branch files at HEAD.

          Focus areas:
          - GitHub Actions workflow safety, token permissions, command injection, unsafe event selection, and secret exposure.
          - Docker and container trust issues, especially mutable tags, untrusted registries, or risky shell usage.
          - Unsafe HTML, JavaScript, or shortcode behavior under layouts and content rendering paths.
          - Secrets, credentials, tokens, or internal URLs accidentally committed in Markdown, YAML, JSON, or scripts.
          - Dependency and supply-chain risk in package.json and package-lock.json.
          - Any change that could expose generated site content to script injection or unsafe embedded content.

          Output rules:
          - Report only actionable findings with evidence from the repository.
          - Format the response as clean GitHub-flavored Markdown suitable for a pull request comment.
          - Use this exact structure:
            - ### Summary
            - one sentence describing the overall result
            - blank line
            - ### Findings
            - one subsection per finding using #### <Severity>: <short title>
            - blank line
            - Affected files: followed by a bullet list of file paths with line references when available
            - Why it matters: as a short paragraph
            - Remediation: as a short paragraph or 1 to 3 bullet points
            - blank line
            - ### Result
            - a final line stating either Action recommended. or No actionable security findings in scope.
          - Use severity labels: High, Medium, Low.
          - Keep paragraphs short and leave a blank line between sections.
          - Do not use dense inline labels on the same line as long text.
          - If there are no actionable findings, still include ### Summary, ### Findings, and ### Result, and under ### Findings write No actionable security findings in scope.
          EOF

      - name: Prepare review payload
        id: prepare_payload
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          pr_number = os.environ["PR_NUMBER"]
          pr_ref = f"refs/remotes/origin/pr/{pr_number}"

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True)

          instructions = Path(".codex-security-review.md").read_text()
          changed_files = git("diff", "--name-only", f"HEAD...{pr_ref}").strip()
          diff_text = git(
              "diff",
              "--unified=3",
              "--no-ext-diff",
              "--no-color",
              "--find-renames",
              f"HEAD...{pr_ref}",
          )

          max_diff_chars = 120000
          truncated = len(diff_text) > max_diff_chars
          diff_excerpt = diff_text[:max_diff_chars]
          if truncated:
              diff_excerpt += "\n\n[diff truncated for size]\n"

          user_input = f"""Pull request metadata:
          - Repository: {os.environ["GH_REPOSITORY"]}
          - Pull request number: #{pr_number}
          - Title: {os.environ["PR_TITLE"]}
          - Author: {os.environ["PR_AUTHOR"]}
          - Base branch: {os.environ["PR_BASE_REF"]}
          - Head branch: {os.environ["PR_HEAD_REF"]}

          Changed files:
          {changed_files if changed_files else '[no changed files detected]'}

          Unified diff:
          ```diff
          {diff_excerpt if diff_excerpt else '[no diff detected]'}
          ```
          """

          payload = {
              "model": "gpt-5-mini",
              "instructions": instructions,
              "input": user_input,
              "max_output_tokens": 1800,
          }

          Path("openai-responses-request.json").write_text(json.dumps(payload))
          PY

      - name: Check whether Codex is configured
        id: codex_auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # Keep this job read-only and non-executing with respect to PR content.
      # If you add steps here later, do not run repository scripts from PR refs.
      - name: Run advisory review through the OpenAI Responses API
        if: steps.codex_auth.outputs.enabled == 'true'
        id: run_review
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          curl --fail --silent --show-error \
            https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @openai-responses-request.json \
            > openai-responses-result.json

          python3 <<'PY'
          import json
          from pathlib import Path

          response = json.loads(Path("openai-responses-result.json").read_text())
          output_text = response.get("output_text")

          if not output_text:
              chunks = []
              for item in response.get("output", []):
                  for content in item.get("content", []):
                      if content.get("type") == "output_text":
                          text = content.get("text", "")
                          if text:
                              chunks.append(text)
              output_text = "\n".join(chunks).strip()

          if not output_text:
              raise SystemExit("OpenAI response did not contain output text.")

          Path("codex-security-report.md").write_text(output_text.rstrip() + "\n")
          PY

      - name: Capture final review message
        if: steps.codex_auth.outputs.enabled == 'true'
        id: final_message
        shell: bash
        run: |
          delimiter="$(openssl rand -hex 16)"
          {
            echo "final_message<<${delimiter}"
            cat codex-security-report.md
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish report to the job summary
        if: steps.codex_auth.outputs.enabled == 'true'
        shell: bash
        run: |
          {
            echo "## Codex advisory security review"
            echo
            cat codex-security-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note missing Codex credentials
        if: steps.codex_auth.outputs.enabled != 'true'
        run: |
          echo "## Codex advisory security review" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped because the \`OPENAI_API_KEY\` repository secret is not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload advisory report artifact
        if: steps.codex_auth.outputs.enabled == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: codex-security-report
          path: codex-security-report.md
          if-no-files-found: error

  post_feedback:
    if: github.event_name == 'pull_request_target' && needs.codex_review.outputs.enabled == 'true' && needs.codex_review.outputs.final_message != ''
    runs-on: ubuntu-latest
    needs:
      - codex_review
    permissions:
      pull-requests: write
    steps:
      # This job may write one advisory PR comment, but it should not execute
      # any untrusted repository content or accept user-controlled scripts.
      - name: Upsert pull request comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex_review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-advisory-security-review -->';
            const finalMessage = (process.env.CODEX_FINAL_MESSAGE || '').trim();
            const body = [
              marker,
              '## Codex advisory security review',
              '',
              'This workflow is advisory only and does not block deployment.',
              '',
              finalMessage,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
